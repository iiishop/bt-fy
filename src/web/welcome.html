<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Butterfly - 选择 WiFi</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #0a0a0a;
            --border: #1f1f1f;
            --text: #faf8f5;
            --muted: #8a8a8a;
            --accent: #c9a962;
            --ok: #4ade80;
            --err: #f87171;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
        }
        .app {
            max-width: 420px;
            margin: 0 auto;
            padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
        }
        h1 { margin: 0 0 8px; font-size: 24px; font-weight: 400; }
        .sub { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .btn.primary { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .wifi-list { list-style: none; padding: 0; margin: 0; }
        .wifi-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .wifi-item:active { background: #151515; }
        .wifi-ssid { font-weight: 500; }
        .wifi-meta { font-size: 12px; color: var(--muted); }
        .wifi-auth { font-size: 11px; color: var(--muted); margin-left: 8px; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 16px;
        }
        .modal {
            background: var(--panel);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 360px;
            padding: 20px;
        }
        .modal h2 { margin: 0 0 16px; font-size: 18px; }
        .modal .field { margin-bottom: 14px; }
        .modal label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
        .modal input {
            width: 100%;
            padding: 10px;
            background: #0f0f0f;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 15px;
        }
        .modal .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .modal .btn-row .btn { flex: 1; margin: 0; }
        .msg { font-size: 14px; margin-top: 12px; padding: 10px; border-radius: 0; }
        .msg.err { background: rgba(248,113,113,0.15); color: var(--err); }
        .msg.ok { background: rgba(74,222,128,0.15); color: var(--ok); }
        .success-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            margin-top: 20px;
        }
        .success-box h2 { margin: 0 0 12px; font-size: 18px; color: var(--ok); }
        .success-box p { margin: 8px 0; font-size: 14px; color: var(--muted); }
        .success-box a {
            display: inline-block;
            margin-top: 12px;
            padding: 12px 20px;
            background: var(--accent);
            color: #0a0a0a;
            text-decoration: none;
            font-weight: 600;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <main class="app">
        <h1>Butterfly</h1>
        <p class="sub">选择要连接的 WiFi 网络</p>

        <button type="button" class="btn" id="btnScan">扫描网络</button>

        <ul class="wifi-list" id="wifiList"></ul>
        <p class="msg hidden" id="msg"></p>

        <div class="success-box hidden" id="successBox">
            <h2>连接成功</h2>
            <p>请将手机连接到 WiFi「<span id="successSsid"></span>」，然后点击下方按钮打开控制台。</p>
            <a href="#" id="successLink">打开 Dashboard</a>
        </div>
    </main>

    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">连接 WiFi</h2>
            <form id="connectForm">
                <input type="hidden" id="connectSsid" />
                <input type="hidden" id="connectAuth" value="wpa2" />
                <div class="field">
                    <label>网络名称 (SSID)</label>
                    <input type="text" id="connectSsidDisplay" readonly />
                </div>
                <div class="field" id="fieldPassword">
                    <label>密码</label>
                    <input type="password" id="connectPassword" placeholder="无密码请留空" autocomplete="off" />
                </div>
                <div class="field hidden" id="fieldUsername">
                    <label>用户名（企业网络）</label>
                    <input type="text" id="connectUsername" placeholder="选填" autocomplete="off" />
                </div>
                <div class="msg hidden" id="connectMsg"></div>
                <div class="btn-row">
                    <button type="button" class="btn" id="btnCancel">取消</button>
                    <button type="submit" class="btn primary" id="btnConnect">连接</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const wifiList = document.getElementById("wifiList");
        const btnScan = document.getElementById("btnScan");
        const msg = document.getElementById("msg");
        const successBox = document.getElementById("successBox");
        const successSsid = document.getElementById("successSsid");
        const successLink = document.getElementById("successLink");
        const modalOverlay = document.getElementById("modalOverlay");
        const modalTitle = document.getElementById("modalTitle");
        const connectForm = document.getElementById("connectForm");
        const connectSsid = document.getElementById("connectSsid");
        const connectSsidDisplay = document.getElementById("connectSsidDisplay");
        const connectAuth = document.getElementById("connectAuth");
        const connectPassword = document.getElementById("connectPassword");
        const connectUsername = document.getElementById("connectUsername");
        const fieldPassword = document.getElementById("fieldPassword");
        const fieldUsername = document.getElementById("fieldUsername");
        const connectMsg = document.getElementById("connectMsg");
        const btnCancel = document.getElementById("btnCancel");
        const btnConnect = document.getElementById("btnConnect");

        function showMsg(text, isErr) {
            msg.textContent = text;
            msg.className = "msg " + (isErr ? "err" : "ok");
            msg.classList.remove("hidden");
        }
        function hideMsg() {
            msg.classList.add("hidden");
        }

        async function scan() {
            btnScan.disabled = true;
            wifiList.innerHTML = "";
            hideMsg();
            try {
                const res = await fetch("/api/wifi/scan");
                const data = await res.json();
                if (!data.networks || !data.networks.length) {
                    showMsg("未发现网络，请重试", true);
                    return;
                }
                data.networks.forEach(function(ap) {
                    const li = document.createElement("li");
                    li.className = "wifi-item";
                    li.dataset.ssid = ap.ssid;
                    li.dataset.auth = ap.auth || "open";
                    li.innerHTML = "<span><span class=\"wifi-ssid\">" + escapeHtml(ap.ssid) + "</span><span class=\"wifi-auth\">" + escapeHtml(ap.auth) + "</span></span><span class=\"wifi-meta\">" + ap.rssi + " dBm</span>";
                    li.addEventListener("click", function() { openConnectModal(ap.ssid, ap.auth); });
                    wifiList.appendChild(li);
                });
            } catch (e) {
                showMsg("扫描失败: " + e.message, true);
            }
            btnScan.disabled = false;
        }

        function escapeHtml(s) {
            const div = document.createElement("div");
            div.textContent = s;
            return div.innerHTML;
        }

        function openConnectModal(ssid, auth) {
            connectSsid.value = ssid;
            connectSsidDisplay.value = ssid;
            connectAuth.value = auth || "wpa2";
            connectPassword.value = "";
            connectUsername.value = "";
            connectMsg.classList.add("hidden");
            fieldPassword.classList.remove("hidden");
            fieldUsername.classList.add("hidden");
            if (auth === "open" || auth === "none") {
                fieldPassword.classList.add("hidden");
            } else if (auth === "wpa2_enterprise" || auth === "enterprise") {
                fieldUsername.classList.remove("hidden");
            }
            modalOverlay.classList.remove("hidden");
        }

        function closeModal() {
            modalOverlay.classList.add("hidden");
        }

        btnCancel.addEventListener("click", closeModal);

        connectForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            connectMsg.classList.add("hidden");
            const ssid = connectSsid.value.trim();
            if (!ssid) return;
            const auth = connectAuth.value;
            const password = connectPassword.value.trim() || null;
            const username = connectUsername.value.trim() || null;
            btnConnect.disabled = true;
            try {
                const body = JSON.stringify({
                    ssid: ssid,
                    password: password,
                    username: username,
                    auth: auth
                });
                const res = await fetch("/api/wifi/connect", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: body
                });
                const data = await res.json();
                if (data.ok && data.ip) {
                    closeModal();
                    successSsid.textContent = data.ssid || ssid;
                    successLink.href = "http://" + data.ip + "/dashboard.html";
                    successBox.classList.remove("hidden");
                    try {
                        await fetch("/api/wifi/stop_ap", { method: "POST" });
                    } catch (_) {}
                } else {
                    connectMsg.textContent = data.error || "连接失败";
                    connectMsg.classList.remove("hidden");
                    connectMsg.classList.add("err");
                }
            } catch (err) {
                connectMsg.textContent = "请求失败: " + err.message;
                connectMsg.classList.remove("hidden");
                connectMsg.classList.add("err");
            }
            btnConnect.disabled = false;
        });

        btnScan.addEventListener("click", scan);

        (function checkAlreadyConnected() {
            fetch("/api/wifi/status")
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.connected && data.ip) {
                        successSsid.textContent = data.ssid || "";
                        successLink.href = "http://" + data.ip + "/dashboard.html";
                        successBox.classList.remove("hidden");
                    }
                })
                .catch(function() {});
        })();
    </script>
</body>
</html>
