<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Butterfly Dashboard</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #0a0a0a;
            --border: #1f1f1f;
            --text: #faf8f5;
            --muted: #8a8a8a;
            --accent: #c9a962;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 24px;
            max-width: 320px;
            width: 100%;
        }
        h1 { margin: 0 0 20px; font-size: 22px; font-weight: 400; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.95; }
    </style>
</head>
<body>
    <main class="card">
        <h1>Butterfly Dashboard</h1>
        <a href="/debug.html" class="btn">Debug</a>
    </main>
</body>
</html>
