# 使用项目内 Gradle 缓存，避免 F:\Document\.gradle 损坏或占用导致构建失败
org.gradle.user.home=d:/bt-fy/flutter_app/android/.gradle-home
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 --add-opens=java.base/java.lang=ALL-UNNAMED --enable-native-access=ALL-UNNAMED
# 强制使用 JDK 17 构建（当前默认 JDK 25.0.2 会导致 Kotlin 解析 Java 版本时报错）
org.gradle.java.home=C:\\Program Files\\ojdkbuild\\java-17-openjdk-17.0.3.0.6-1
android.useAndroidX=true
# 全局指定 build-tools，避免插件请求 25.0.2（若本机无 36.0.0 可改为 34.0.0）
android.buildToolsVersion=36.0.0
# 避免 Kotlin 增量编译缓存冲突
kotlin.incremental=false
org.gradle.caching=false
